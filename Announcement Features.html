<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI News</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f4f5f7;
    color: #1a1a2e;
    display: flex;
    min-height: 100vh;
  }

  /* ── LOGIN PAGE ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 100vh;
    background: #f4f5f7;
  }

  #dashboard-screen { display: none; width: 100%; display: none; }
  #dashboard-screen.visible { display: flex; }

  .login-card {
    background: #fff;
    border-radius: 16px;
    padding: 2.75rem 2.5rem 2.25rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    animation: fadeIn 0.3s ease;
  }

  .login-logo {
    width: 48px; height: 48px;
    background: #e8642c;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    margin-bottom: 1.5rem;
  }

  .login-title {
    font-size: 1.4rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 0.35rem;
  }

  .login-subtitle {
    font-size: 0.8rem;
    color: #8a8fa3;
    margin-bottom: 2rem;
  }

  .login-field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-bottom: 1.1rem;
  }

  .login-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: #5a5f72;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .login-input {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.875rem;
    color: #1a1a2e;
    background: #f9fafb;
    border: 1.5px solid #e8eaed;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .login-input:focus {
    outline: none;
    border-color: #e8642c;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(232,100,44,0.1);
  }

  .login-error {
    font-size: 0.75rem;
    color: #e8642c;
    margin-bottom: 1rem;
    display: none;
    background: #fff3ee;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    border-left: 3px solid #e8642c;
  }

  .login-error.visible { display: block; }

  .btn-login {
    width: 100%;
    background: #e8642c;
    color: white;
    border: none;
    padding: 0.8rem;
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .btn-login:hover { background: #d45520; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }

  .login-hint {
    margin-top: 1.25rem;
    font-size: 0.72rem;
    color: #b0b4c1;
    text-align: center;
    line-height: 1.6;
  }

  .login-hint strong { color: #8a8fa3; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    min-height: 100vh;
    background: #fff;
    border-right: 1px solid #e8eaed;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .user-section {
    padding: 1.5rem 1.25rem 1rem;
    border-bottom: 1px solid #f0f0f0;
  }

  .user-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #e8642c;
    color: white;
    font-weight: 700;
    font-size: 0.95rem;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 0.6rem;
  }

  .user-email {
    font-size: 0.78rem;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 0.15rem;
  }

  .user-sub {
    font-size: 0.72rem;
    color: #8a8fa3;
  }

  .edit-icon {
    margin-top: 0.4rem;
    font-size: 0.75rem;
    color: #b0b4c1;
    cursor: pointer;
  }

  .nav {
    padding: 0.75rem 0;
    flex: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.65rem 1.25rem;
    font-size: 0.85rem;
    font-weight: 500;
    color: #5a5f72;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    border-left: 3px solid transparent;
  }

  .nav-item:hover { background: #fdf5f2; color: #e8642c; }

  .nav-item.active {
    background: #fef3ee;
    color: #e8642c;
    border-left-color: #e8642c;
    font-weight: 600;
  }

  .nav-icon { font-size: 1rem; width: 20px; text-align: center; }

  /* ── MAIN ── */
  .main {
    flex: 1;
    padding: 2rem 2.5rem;
    overflow-x: hidden;
  }

  .page-view { display: none; }
  .page-view.active { display: block; animation: fadeIn 0.2s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .page-title {
    font-size: 1.4rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 1.5rem;
  }

  .content-card {
    background: #fff;
    border-radius: 12px;
    padding: 1.75rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    gap: 1rem;
  }

  .card-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #1a1a2e;
    flex-shrink: 0;
  }

  .btn-create {
    background: #e8642c;
    color: white;
    border: none;
    padding: 0.6rem 1.25rem;
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .btn-create:hover { background: #d45520; transform: translateY(-1px); }
  .btn-create:active { transform: translateY(0); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    border-bottom: 2px solid #f0f0f0;
    margin-bottom: 1.75rem;
  }

  .tab {
    padding: 0.6rem 1.1rem;
    font-size: 0.83rem;
    font-weight: 500;
    color: #8a8fa3;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .tab:hover { color: #e8642c; }

  .tab.active {
    color: #e8642c;
    border-bottom-color: #e8642c;
    font-weight: 600;
  }

  /* ── NEWS GRID ── */
  .news-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.25rem;
  }

  .news-card {
    border: 1.5px solid #e8eaed;
    border-radius: 10px;
    padding: 1.25rem 1.4rem;
    background: #fff;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .news-card:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    border-color: #e8642c;
    transform: translateY(-2px);
  }

  .news-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 0.4rem;
    letter-spacing: 0.01em;
  }

  .news-desc {
    font-size: 0.8rem;
    color: #5a5f72;
    margin-bottom: 1rem;
    line-height: 1.5;
  }

  .news-meta {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    margin-bottom: 1rem;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.76rem;
    color: #8a8fa3;
  }

  .meta-icon { font-size: 0.8rem; color: #b0b4c1; width: 14px; }

  .news-footer {
    padding-top: 0.85rem;
    border-top: 1px solid #f3f4f6;
    font-size: 0.74rem;
    color: #8a8fa3;
    line-height: 1.6;
  }

  .divider {
    border: none;
    border-top: 1px solid #e8eaed;
    opacity: 0.4;
    margin: 0.85rem 0;
  }

  .empty-state {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
    color: #b0b4c1;
    font-size: 0.85rem;
  }

  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

  /* ── DETAIL PAGE ── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    font-weight: 500;
    color: #8a8fa3;
    cursor: pointer;
    margin-bottom: 1.25rem;
    transition: color 0.15s;
    background: none;
    border: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    padding: 0;
  }

  .back-btn:hover { color: #e8642c; }

  .detail-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .detail-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 1.75rem;
    border-bottom: 1px solid #f0f0f0;
    gap: 1rem;
  }

  .detail-card-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #1a1a2e;
  }

  .detail-body {
    padding: 2rem 1.75rem;
  }

  .detail-announcement-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.4;
    margin-bottom: 1.75rem;
  }

  .detail-fields {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .detail-field {
    display: flex;
    align-items: flex-start;
    padding: 0.9rem 0;
    border-bottom: 1px solid #f3f4f6;
    gap: 1rem;
  }

  .detail-field:last-child { border-bottom: none; }

  .detail-field-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: #b0b4c1;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    width: 110px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .detail-field-value {
    font-size: 0.85rem;
    color: #1a1a2e;
    line-height: 1.5;
  }

  .detail-field-value.muted { color: #8a8fa3; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.25rem 0.7rem;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    background: #e8f5e9;
    color: #1a7a45;
  }

  .status-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #1a7a45;
  }

  /* ── EDIT PAGE ── */
  .edit-field-group {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    margin-bottom: 2rem;
  }

  .edit-field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .edit-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: #8a8fa3;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .edit-input,
  .edit-textarea {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.875rem;
    color: #1a1a2e;
    background: #f9fafb;
    border: 1.5px solid #e8eaed;
    border-radius: 8px;
    padding: 0.7rem 0.95rem;
    width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
    resize: none;
    line-height: 1.55;
  }

  .edit-input:focus,
  .edit-textarea:focus {
    outline: none;
    border-color: #e8642c;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(232,100,44,0.1);
  }

  .edit-textarea { min-height: 110px; }

  .edit-card-footer {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 0.75rem;
    padding-top: 1.25rem;
    border-top: 1px solid #f0f0f0;
  }

  .btn-cancel {
    background: white;
    color: #e8642c;
    border: 1.5px solid #e8642c;
    padding: 0.6rem 1.4rem;
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .btn-cancel:hover { background: #fff3ee; }

  .btn-save {
    background: #e8642c;
    color: white;
    border: none;
    padding: 0.6rem 1.4rem;
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-save:hover { background: #d45520; transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }

  /* ── POPUP MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }

  .modal-overlay.open { display: flex; }

  .modal-box {
    background: #fff;
    border-radius: 14px;
    padding: 2rem 2rem 1.5rem;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    animation: popIn 0.2s ease;
    text-align: center;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.93); }
    to   { opacity: 1; transform: scale(1); }
  }

  .modal-icon {
    font-size: 2.2rem;
    margin-bottom: 0.75rem;
  }

  .modal-title {
    font-size: 1rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 0.6rem;
  }

  .modal-message {
    font-size: 0.83rem;
    color: #5a5f72;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .modal-actions {
    display: flex;
    justify-content: center;
  }

  .btn-modal-ok {
    background: #e8642c;
    color: white;
    border: none;
    padding: 0.65rem 2.5rem;
    border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-modal-ok:hover { background: #d45520; transform: translateY(-1px); }
  .btn-modal-ok:active { transform: translateY(0); }
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">📢</div>
    <div class="login-title">Welcome back</div>
    <div class="login-subtitle">Sign in to your SuperApp dashboard</div>

    <div class="login-field">
      <label class="login-label">Username</label>
      <input class="login-input" id="login-username" type="text" placeholder="Enter your username" onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <div class="login-field">
      <label class="login-label">Password</label>
      <input class="login-input" id="login-password" type="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <div class="login-error" id="login-error">❌ Incorrect username or password. Please try again.</div>

    <button class="btn-login" onclick="doLogin()">Sign In</button>

    <div class="login-hint">
      Demo credentials — Username: <strong>admin</strong> · Password: <strong>admin123</strong>
    </div>
  </div>
</div>

<!-- ══ DASHBOARD SCREEN ══ -->
<div id="dashboard-screen">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="user-section">
    <div class="user-avatar">M</div>
    <div class="user-email">mis.intern&#64;i-city.my</div>
    <div class="user-sub">mis.intern&#64;i-city.my</div>
    <div class="edit-icon">✏️</div>
  </div>

  <nav class="nav">
    <a class="nav-item" href="#" onclick="navigateTo('gossip', this); return false;">
      <span class="nav-icon">🎉</span> Gossip
    </a>
    <a class="nav-item" href="#" onclick="navigateTo('event', this); return false;">
      <span class="nav-icon">🚀</span> Event
    </a>
    <a class="nav-item active" href="#" onclick="navigateTo('ainews', this); return false;">
      <span class="nav-icon">🤖</span> AI News
    </a>
    <a class="nav-item" href="#" onclick="navigateTo('announcement', this); return false;">
      <span class="nav-icon">📢</span> Announcement
    </a>
    <a class="nav-item" href="#" onclick="doLogout(); return false;">
      <span class="nav-icon">🚪</span> Logout
    </a>
  </nav>
</aside>

<!-- MAIN CONTENT -->
<main class="main">

  <!-- ══ AI NEWS PAGE ══ -->
  <div class="page-view active" id="page-ainews">
    <div class="page-title">AI News</div>
    <div class="content-card">
      <div class="card-header">
        <div class="card-title">AI News</div>
        <button class="btn-create" onclick="alert('Create AI News clicked!')">Create AI</button>
      </div>

      <div cl
